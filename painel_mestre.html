<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Chronosfera RPG - Painel do Mestre</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; }
        .import-section { background: #e8f4f8; padding: 15px; border-radius: 5px; border: 1px dashed #3498db; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input[type="text"], input[type="number"], select, input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-atributos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; background: #f9f9fc; padding: 15px; border-radius: 5px; border: 1px solid #e0e0e0; }
        button { background-color: #3498db; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 20px; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        button.novo { background-color: #2ecc71; margin-top: 10px; }
        button.novo:hover { background-color: #27ae60; }
        textarea { width: 100%; height: 300px; margin-top: 20px; font-family: monospace; padding: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background-color: #fdfdfd; resize: vertical; border-left: 5px solid #2ecc71; }
        .dica { font-size: 0.85em; color: #7f8c8d; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Painel do Mestre - Chronosfera RPG</h1>
    
    <div class="import-section">
        <div class="form-group">
            <label for="arquivoImport">1. Importar JSON (Base de Dados ou Ficha de Jogador)</label>
            <input type="file" id="arquivoImport" accept=".json" onchange="importarJSON(event)">
        </div>
        
        <div class="form-group">
            <label for="seletorPersonagem">2. Personagens Carregadas</label>
            <select id="seletorPersonagem" onchange="carregarParaEdicao()">
                <option value="">Nenhuma personagem carregada...</option>
            </select>
        </div>
        <button class="novo" onclick="limparFormulario()">Limpar para Criar Nova Personagem</button>
    </div>

    <div class="grid-2">
        <div class="form-group"><label for="nome">Nome da Personagem</label><input type="text" id="nome"></div>
        <div class="form-group"><label for="id">ID Único (Para o sistema)</label><input type="text" id="id"></div>
    </div>

    <div class="grid-2">
        <div class="form-group"><label for="raca">Raça</label><input type="text" id="raca" placeholder="Ex: Humano, Hypello..."></div>
        <div class="form-group">
            <label for="classe">Classe</label>
            <select id="classe" onchange="atualizarDadosMatriz()">
                <option value="">Selecione a Classe...</option>
                <option value="Cavaleiro">Cavaleiro</option>
                <option value="Construto">Construto</option>
                <option value="Espadachim">Espadachim</option>
                <option value="Selvagem">Selvagem</option>
                <option value="Mecânico">Mecânico</option>
                <option value="Suporte">Suporte</option>
                <option value="Feiticeiro">Feiticeiro</option>
            </select>
        </div>
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label for="afinidade">Afinidade Elemental</label>
            <select id="afinidade">
                <option value="Fogo">Fogo</option>
                <option value="Gelo/Água">Gelo/Água</option>
                <option value="Luz">Luz</option>
                <option value="Sombra">Sombra</option>
                <option value="Neutro">Neutro</option>
            </select>
        </div>
        <div class="grid-2">
            <div class="form-group"><label for="psique">Psiquê (%)</label><input type="number" id="psique" value="100"></div>
            <div class="form-group"><label for="alma">Alma (%)</label><input type="number" id="alma" value="100"></div>
        </div>
    </div>

    <h3>Atributos Brutos</h3>
    <div class="grid-atributos">
        <div class="form-group"><label id="lbl_poder">Poder</label><input type="number" id="poder" value="0"></div>
        <div class="form-group"><label id="lbl_vigor">Vigor</label><input type="number" id="vigor" value="0"></div>
        <div class="form-group"><label id="lbl_velocidade">Velocidade</label><input type="number" id="velocidade" value="0"></div>
        <div class="form-group"><label id="lbl_magia">Magia</label><input type="number" id="magia" value="0"></div>
        <div class="form-group"><label id="lbl_precisao">Precisão</label><input type="number" id="precisao" value="0"></div>
        <div class="form-group"><label id="lbl_esquiva">Esquiva</label><input type="number" id="esquiva" value="0"></div>
        <div class="form-group"><label id="lbl_def_magica">Defesa Mágica</label><input type="number" id="def_magica" value="0"></div>
    </div>

    <button onclick="salvarPersonagem()">Guardar na Base e Gerar JSON Atualizado</button>

    <h3 id="ancora-resultado" style="margin-top: 30px; color: #27ae60; display: none;">✅ Guardado!</h3>
    <textarea id="resultado" readonly placeholder="O ficheiro atualizado aparecerá aqui..."></textarea>
</div>

<script>
    let bancoDeDados = { personagens: [] };

    const regrasClasses = {
        "Cavaleiro": { arquetipo: "Combatente", pv_base: 60, pm_base: 8, dados: { vigor: "d12", poder: "d10", magia: "d8", def_magica: "d8", velocidade: "d6", esquiva: "d6", precisao: "d4" } },
        "Construto": { arquetipo: "Combatente", pv_base: 72, pm_base: 6, dados: { poder: "d10", vigor: "d12", precisao: "d8", def_magica: "d8", magia: "d6", esquiva: "d6", velocidade: "d4" } },
        "Espadachim": { arquetipo: "Equilibrada", pv_base: 36, pm_base: 4, dados: { velocidade: "d12", poder: "d10", esquiva: "d8", precisao: "d8", vigor: "d6", def_magica: "d6", magia: "d4" } },
        "Selvagem": { arquetipo: "Equilibrada", pv_base: 48, pm_base: 4, dados: { esquiva: "d12", poder: "d10", velocidade: "d8", vigor: "d8", precisao: "d6", def_magica: "d6", magia: "d4" } },
        "Mecânico": { arquetipo: "Arcana / Tecnologia", pv_base: 32, pm_base: 20, dados: { precisao: "d12", magia: "d10", def_magica: "d8", vigor: "d8", poder: "d6", esquiva: "d6", velocidade: "d4" } },
        "Suporte": { arquetipo: "Arcana", pv_base: 24, pm_base: 20, dados: { def_magica: "d12", magia: "d10", precisao: "d8", velocidade: "d8", vigor: "d6", esquiva: "d6", poder: "d4" } },
        "Feiticeiro": { arquetipo: "Arcana", pv_base: 24, pm_base: 24, dados: { magia: "d12", def_magica: "d10", velocidade: "d8", poder: "d8", esquiva: "d6", vigor: "d6", precisao: "d4" } }
    };

    function calcularFibonacci(valor) {
        if (valor >= 1 && valor <= 5) return 0;
        if (valor >= 6 && valor <= 13) return 1;
        if (valor >= 14 && valor <= 26) return 2;
        if (valor >= 27 && valor <= 47) return 3;
        if (valor >= 48 && valor <= 81) return 4;
        if (valor >= 82) return 5;
        return 0;
    }

    function atualizarDadosMatriz() {
        const classeSelecionada = document.getElementById("classe").value;
        if (!classeSelecionada) return;
        const dados = regrasClasses[classeSelecionada].dados;
        document.getElementById("lbl_poder").innerText = "Poder (" + dados.poder + ")";
        document.getElementById("lbl_vigor").innerText = "Vigor (" + dados.vigor + ")";
        document.getElementById("lbl_velocidade").innerText = "Velocidade (" + dados.velocidade + ")";
        document.getElementById("lbl_magia").innerText = "Magia (" + dados.magia + ")";
        document.getElementById("lbl_precisao").innerText = "Precisão (" + dados.precisao + ")";
        document.getElementById("lbl_esquiva").innerText = "Esquiva (" + dados.esquiva + ")";
        document.getElementById("lbl_def_magica").innerText = "Defesa Mágica (" + dados.def_magica + ")";
    }

    function importarJSON(evento) {
        const file = evento.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const dadosLidos = JSON.parse(e.target.result);
                
                if (dadosLidos.personagens) {
                    bancoDeDados = dadosLidos;
                    atualizarSeletorHTML();
                    alert("Base de dados completa carregada! Selecione uma personagem na lista para editar.");
                } else if (dadosLidos.id) {
                    const index = bancoDeDados.personagens.findIndex(p => p.id === dadosLidos.id);
                    if (index > -1) bancoDeDados.personagens[index] = dadosLidos; 
                    else bancoDeDados.personagens.push(dadosLidos); 
                    
                    atualizarSeletorHTML();
                    
                    document.getElementById("seletorPersonagem").value = dadosLidos.id;
                    carregarParaEdicao();
                    alert(`Ficha de ${dadosLidos.dados_basicos.nome} carregada com sucesso e pronta a guardar!`);
                }
            } catch (err) {
                alert("Erro ao ler o ficheiro. Tem a certeza que é um JSON válido?");
            }
        };
        reader.readAsText(file);
    }

    function atualizarSeletorHTML() {
        const seletor = document.getElementById("seletorPersonagem");
        seletor.innerHTML = '<option value="">Selecione para editar...</option>';
        bancoDeDados.personagens.forEach(p => {
            const opcao = document.createElement("option");
            opcao.value = p.id;
            opcao.innerText = p.dados_basicos.nome + " (" + p.dados_basicos.classe + ")";
            seletor.appendChild(opcao);
        });
    }

    function carregarParaEdicao() {
        const idSelecionado = document.getElementById("seletorPersonagem").value;
        if (!idSelecionado) return;
        const p = bancoDeDados.personagens.find(person => person.id === idSelecionado);
        if (p) {
            document.getElementById("id").value = p.id;
            document.getElementById("nome").value = p.dados_basicos.nome || "";
            document.getElementById("raca").value = p.dados_basicos.raca || "";
            document.getElementById("classe").value = p.dados_basicos.classe || "";
            document.getElementById("afinidade").value = p.dados_basicos.afinidade_elemental || "";
            document.getElementById("psique").value = p.status.psique !== undefined ? p.status.psique : 100;
            document.getElementById("alma").value = p.status.alma !== undefined ? p.status.alma : 100;
            
            atualizarDadosMatriz();

            document.getElementById("poder").value = p.atributos.poder.bruto;
            document.getElementById("vigor").value = p.atributos.vigor.bruto;
            document.getElementById("velocidade").value = p.atributos.velocidade.bruto;
            document.getElementById("magia").value = p.atributos.magia.bruto;
            document.getElementById("precisao").value = p.atributos.precisao.bruto;
            document.getElementById("esquiva").value = p.atributos.esquiva.bruto;
            document.getElementById("def_magica").value = p.atributos.defesa_magica.bruto;
        }
    }

    function limparFormulario() {
        document.getElementById("id").value = "";
        document.getElementById("nome").value = "";
        document.getElementById("raca").value = "";
        document.getElementById("classe").value = "";
        document.getElementById("afinidade").value = "Neutro";
        document.getElementById("psique").value = "100";
        document.getElementById("alma").value = "100";
        document.getElementById("poder").value = "0";
        document.getElementById("vigor").value = "0";
        document.getElementById("velocidade").value = "0";
        document.getElementById("magia").value = "0";
        document.getElementById("precisao").value = "0";
        document.getElementById("esquiva").value = "0";
        document.getElementById("def_magica").value = "0";
        document.getElementById("seletorPersonagem").value = "";
    }

    function salvarPersonagem() {
        const id = document.getElementById("id").value;
        const nome = document.getElementById("nome").value;
        const raca = document.getElementById("raca").value || "Desconhecida";
        const classeNome = document.getElementById("classe").value;
        const afinidade = document.getElementById("afinidade").value;

        if (!id || !classeNome) {
            alert("Preencha ao menos o ID e a Classe!");
            return;
        }

        const infoClasse = regrasClasses[classeNome];

        const vPoder = parseInt(document.getElementById("poder").value) || 0;
        const vVigor = parseInt(document.getElementById("vigor").value) || 0;
        const vVelocidade = parseInt(document.getElementById("velocidade").value) || 0;
        const vMagia = parseInt(document.getElementById("magia").value) || 0;
        const vPrecisao = parseInt(document.getElementById("precisao").value) || 0;
        const vEsquiva = parseInt(document.getElementById("esquiva").value) || 0;
        const vDefMagica = parseInt(document.getElementById("def_magica").value) || 0;
        
        const vPsique = parseInt(document.getElementById("psique").value) || 0;
        const vAlma = parseInt(document.getElementById("alma").value) || 0;

        const bonusEsquiva = calcularFibonacci(vEsquiva);

        const fichaAtualizada = {
            "id": id,
            "dados_basicos": {
                "nome": nome,
                "raca": raca,
                "nivel": 1,
                "classe": classeNome,
                "arquetipo": infoClasse.arquetipo,
                "afinidade_elemental": afinidade
            },
            "status": {
                "pv_maximo": vVigor + infoClasse.pv_base,
                "pm_maximo": vMagia + infoClasse.pm_base,
                "psique": vPsique,
                "alma": vAlma,
                "nd_esquiva_base": 8 + bonusEsquiva
            },
            "atributos": {
                "poder": { "dado": infoClasse.dados.poder, "bruto": vPoder, "bonus": calcularFibonacci(vPoder) },
                "vigor": { "dado": infoClasse.dados.vigor, "bruto": vVigor, "bonus": calcularFibonacci(vVigor) },
                "velocidade": { "dado": infoClasse.dados.velocidade, "bruto": vVelocidade, "bonus": calcularFibonacci(vVelocidade) },
                "magia": { "dado": infoClasse.dados.magia, "bruto": vMagia, "bonus": calcularFibonacci(vMagia) },
                "precisao": { "dado": infoClasse.dados.precisao, "bruto": vPrecisao, "bonus": calcularFibonacci(vPrecisao) },
                "esquiva": { "dado": infoClasse.dados.esquiva, "bruto": vEsquiva, "bonus": bonusEsquiva },
                "defesa_magica": { "dado": infoClasse.dados.def_magica, "bruto": vDefMagica, "bonus": calcularFibonacci(vDefMagica) }
            },
            "referencias": {
                "dano_fisico": "Dados da Arma + Atributo Bruto (Poder ou Precisão)",
                "dano_magico": "Dados da Magia + Magia Bruta"
            }
        };

        const index = bancoDeDados.personagens.findIndex(p => p.id === id);
        if (index > -1) bancoDeDados.personagens[index] = fichaAtualizada; 
        else bancoDeDados.personagens.push(fichaAtualizada); 

        atualizarSeletorHTML();
        document.getElementById("seletorPersonagem").value = id;

        const txtArea = document.getElementById("resultado");
        const jsonFinal = JSON.stringify(bancoDeDados, null, 4);
        txtArea.value = jsonFinal;
        
        const msgSucesso = document.getElementById("ancora-resultado");
        msgSucesso.style.display = "block";
        msgSucesso.scrollIntoView({ behavior: 'smooth' });

        // Tenta usar a cópia moderna
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(jsonFinal).then(() => {
                msgSucesso.innerText = "✅ Guardado e copiado! É só fazer Ctrl+V no ficheiro banco_de_dados.json no GitHub.";
            }).catch(err => {
                // Falhou por permissão, avança para a seleção
                txtArea.select();
                msgSucesso.innerText = "✅ Guardado! (O navegador bloqueou a cópia. Faça Ctrl+C no texto selecionado abaixo).";
            });
        } else {
            // Método alternativo para ficheiros locais
            txtArea.select();
            try {
                document.execCommand('copy');
                msgSucesso.innerText = "✅ Guardado e copiado com sucesso! É só fazer Ctrl+V no seu ficheiro.";
            } catch (err) {
                msgSucesso.innerText = "✅ Guardado! O seu navegador requer cópia manual. Pressione Ctrl+C no texto selecionado abaixo.";
            }
        }
    }
</script>

</body>
</html>
