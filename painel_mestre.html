<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Chronosfera RPG - Painel do Mestre</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; }
        .import-section { background: #e8f4f8; padding: 15px; border-radius: 5px; border: 1px dashed #3498db; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 0.9em; }
        input[type="text"], input[type="number"], select, input[type="file"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit;}
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .grid-atributos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; background: #f9f9fc; padding: 15px; border-radius: 5px; border: 1px solid #e0e0e0; }
        
        button { background-color: #3498db; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 20px; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        textarea.json-output { height: 200px; font-family: monospace; background-color: #fdfdfd; border-left: 5px solid #2ecc71; margin-top: 10px; }
        textarea.large-input { height: 100px; resize: vertical; }
        
        /* Estilos do Bloco de Techs */
        .tech-box { background: #fdfdfd; border: 1px solid #dcdde1; border-left: 4px solid #9b59b6; border-radius: 6px; padding: 15px; margin-bottom: 15px; position: relative;}
        .btn-remover-tech { background-color: #e74c3c; width: auto; padding: 5px 10px; font-size: 12px; position: absolute; right: 15px; top: 10px; margin: 0;}
        .btn-remover-tech:hover { background-color: #c0392b; }
        .btn-add-tech { background-color: #9b59b6; margin-top: 5px;}
        .btn-add-tech:hover { background-color: #8e44ad; }
    </style>
</head>
<body>

<div class="container">
    <h1>Painel do Mestre - Chronosfera RPG</h1>
    
    <div class="import-section">
        <div class="form-group">
            <label>1. Importar Base de Dados (.json)</label>
            <input type="file" id="arquivoImport" accept=".json" onchange="importarJSON(event)">
        </div>
        <div class="form-group">
            <label>2. Selecionar Personagem</label>
            <select id="seletorPersonagem" onchange="carregarParaEdicao()">
                <option value="">Nenhuma personagem carregada...</option>
            </select>
        </div>
    </div>

    <div class="grid-2">
        <div class="form-group"><label>Nome</label><input type="text" id="nome"></div>
        <div class="form-group"><label>ID Único</label><input type="text" id="id"></div>
    </div>
    <div class="grid-3">
        <div class="form-group"><label>Nível</label><input type="number" id="nivel" value="1"></div>
        <div class="form-group"><label>XP Atual</label><input type="number" id="xp_atual" value="0"></div>
        <div class="form-group"><label>XP Próximo Nível</label><input type="number" id="xp_proximo" value="50"></div>
    </div>
    <div class="grid-2">
        <div class="form-group"><label>Raça</label><input type="text" id="raca"></div>
        <div class="form-group">
            <label>Classe</label>
            <select id="classe" onchange="atualizarDadosMatriz()">
                <option value="Cavaleiro">Cavaleiro</option>
                <option value="Construto">Construto</option>
                <option value="Espadachim">Espadachim</option>
                <option value="Selvagem">Selvagem</option>
                <option value="Mecânico">Mecânico</option>
                <option value="Suporte">Suporte</option>
                <option value="Feiticeiro">Feiticeiro</option>
            </select>
        </div>
    </div>
    <div class="grid-2">
        <div class="form-group"><label>URL da Imagem</label><input type="text" id="url_imagem"></div>
        <div class="form-group">
            <label>Afinidade Elemental</label>
            <select id="afinidade">
                <option value="Fogo">Fogo</option>
                <option value="Gelo/Água">Gelo/Água</option>
                <option value="Luz">Luz</option>
                <option value="Sombra">Sombra</option>
                <option value="Neutro">Neutro</option>
            </select>
        </div>
    </div>

    <h3>Atributos Brutos</h3>
    <div class="grid-atributos">
        <div class="form-group"><label id="lbl_poder">Poder</label><input type="number" id="poder" value="0"></div>
        <div class="form-group"><label id="lbl_vigor">Vigor</label><input type="number" id="vigor" value="0"></div>
        <div class="form-group"><label id="lbl_velocidade">Velocidade</label><input type="number" id="velocidade" value="0"></div>
        <div class="form-group"><label id="lbl_magia">Magia</label><input type="number" id="magia" value="0"></div>
        <div class="form-group"><label id="lbl_precisao">Precisão</label><input type="number" id="precisao" value="0"></div>
        <div class="form-group"><label id="lbl_esquiva">Esquiva</label><input type="number" id="esquiva" value="0"></div>
        <div class="form-group"><label id="lbl_def_magica">Defesa Mágica</label><input type="number" id="def_magica" value="0"></div>
    </div>

    <div class="form-group" style="margin-top:20px;">
        <label>Laços (Formato: Nome: Porcentagem - um por linha)</label>
        <textarea id="lacos" class="large-input"></textarea>
    </div>
    <div class="form-group"><label>Inventário</label><textarea id="inventario" class="large-input"></textarea></div>

    <h3 style="margin-top: 30px; border-bottom: 2px solid #9b59b6; color: #8e44ad;">Techs & Habilidades</h3>
    <div id="lista-techs"></div>
    <button type="button" class="btn-add-tech" onclick="adicionarTech()">+ Adicionar Nova Tech</button>

    <button onclick="salvarPersonagem()" style="background-color: #27ae60; margin-top: 40px;">Salvar e Baixar banco_de_dados.json</button>
</div>

<script>
    let bancoDeDados = { personagens: [] };
    const regrasClasses = {
        "Cavaleiro": { arquetipo: "Combatente", pv_base: 60, pm_base: 8, dados: { vigor: "d12", poder: "d10", magia: "d8", def_magica: "d8", velocidade: "d6", esquiva: "d6", precisao: "d4" } },
        "Construto": { arquetipo: "Combatente", pv_base: 72, pm_base: 6, dados: { poder: "d10", vigor: "d12", precisao: "d8", def_magica: "d8", magia: "d6", esquiva: "d6", velocidade: "d4" } },
        "Espadachim": { arquetipo: "Equilibrada", pv_base: 36, pm_base: 4, dados: { velocidade: "d12", poder: "d10", esquiva: "d8", precisao: "d8", vigor: "d6", def_magica: "d6", magia: "d4" } },
        "Selvagem": { arquetipo: "Equilibrada", pv_base: 48, pm_base: 4, dados: { esquiva: "d12", poder: "d10", velocidade: "d8", vigor: "d8", precisao: "d6", def_magica: "d6", magia: "d4" } },
        "Mecânico": { arquetipo: "Arcana / Tecnologia", pv_base: 32, pm_base: 20, dados: { precisao: "d12", magia: "d10", def_magica: "d8", vigor: "d8", poder: "d6", esquiva: "d6", velocidade: "d4" } },
        "Suporte": { arquetipo: "Arcana", pv_base: 24, pm_base: 20, dados: { def_magica: "d12", magia: "d10", precisao: "d8", velocidade: "d8", vigor: "d6", esquiva: "d6", poder: "d4" } },
        "Feiticeiro": { arquetipo: "Arcana", pv_base: 24, pm_base: 24, dados: { magia: "d12", def_magica: "d10", velocidade: "d8", poder: "d8", esquiva: "d6", vigor: "d6", precisao: "d4" } }
    };

    function calcularFibonacci(v) { return v>=82?5:v>=48?4:v>=27?3:v>=14?2:v>=6?1:0; }

    function atualizarDadosMatriz() {
        const c = document.getElementById("classe").value;
        if(!c) return;
        const d = regrasClasses[c].dados;
        document.getElementById("lbl_poder").innerText = "Poder ("+d.poder+")";
        document.getElementById("lbl_vigor").innerText = "Vigor ("+d.vigor+")";
        document.getElementById("lbl_velocidade").innerText = "Velocidade ("+d.velocidade+")";
        document.getElementById("lbl_magia").innerText = "Magia ("+d.magia+")";
        document.getElementById("lbl_precisao").innerText = "Precisão ("+d.precisao+")";
        document.getElementById("lbl_esquiva").innerText = "Esquiva ("+d.esquiva+")";
        document.getElementById("lbl_def_magica").innerText = "Defesa Mágica ("+d.def_magica+")";
    }

    function importarJSON(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                bancoDeDados = JSON.parse(ev.target.result);
                atualizarSeletorHTML();
            } catch (err) { alert("Erro ao ler o ficheiro JSON."); }
        };
        reader.readAsText(e.target.files[0]);
    }

    function atualizarSeletorHTML() {
        const s = document.getElementById("seletorPersonagem");
        s.innerHTML = '<option value="">Selecionar...</option>';
        bancoDeDados.personagens.forEach(p => {
            const o = document.createElement("option");
            o.value = p.id; o.innerText = p.dados_basicos.nome;
            s.appendChild(o);
        });
    }

    // --- FUNÇÕES DAS TECHS ---
    function adicionarTech(tech = {}) {
        const div = document.createElement('div');
        div.className = 'tech-box';
        div.innerHTML = `
            <button class="btn-remover-tech" onclick="this.parentElement.remove()">Remover</button>
            <div class="grid-2">
                <div class="form-group"><label>Nome da Habilidade</label><input type="text" class="t-nome" value="${tech.nome || ''}"></div>
                <div class="grid-2">
                    <div class="form-group"><label>Custo</label><input type="text" class="t-custo" placeholder="Ex: 2 PM" value="${tech.custo || ''}"></div>
                    <div class="form-group"><label>Elemento</label><input type="text" class="t-elemento" placeholder="Ex: Água/Gelo" value="${tech.elemento || ''}"></div>
                </div>
            </div>
            <div class="grid-3">
                <div class="form-group"><label>Alvo</label><input type="text" class="t-alvo" placeholder="Ex: 1 Inimigo" value="${tech.alvo || ''}"></div>
                <div class="form-group"><label>Tipo de Efeito</label>
                    <select class="t-tipo">
                        <option value="Dano" ${tech.tipo === 'Dano' ? 'selected' : ''}>Dano</option>
                        <option value="Cura" ${tech.tipo === 'Cura' ? 'selected' : ''}>Cura</option>
                        <option value="Bônus" ${tech.tipo === 'Bônus' ? 'selected' : ''}>Bônus / Suporte</option>
                        <option value="Escudo" ${tech.tipo === 'Escudo' ? 'selected' : ''}>Escudo / Defesa</option>
                        <option value="Especial" ${tech.tipo === 'Especial' ? 'selected' : ''}>Especial</option>
                    </select>
                </div>
                <div class="form-group"><label>Rolagem / Valor</label><input type="text" class="t-valor" placeholder="Ex: 1d8 + Magia" value="${tech.valor || ''}"></div>
            </div>
            <div class="form-group"><label>Descrição / Efeito</label><textarea class="t-desc" rows="2">${tech.desc || ''}</textarea></div>
            <div class="form-group"><label>Interação Elemental (Opcional)</label><textarea class="t-inter" rows="2">${tech.inter || ''}</textarea></div>
            <div class="form-group"><label>Dica de Combo (Opcional)</label><textarea class="t-combo" rows="2">${tech.combo || ''}</textarea></div>
        `;
        document.getElementById('lista-techs').appendChild(div);
    }

    function carregarParaEdicao() {
        const id = document.getElementById("seletorPersonagem").value;
        const p = bancoDeDados.personagens.find(x => x.id === id);
        if(!p) return;
        document.getElementById("id").value = p.id;
        document.getElementById("nome").value = p.dados_basicos.nome;
        document.getElementById("nivel").value = p.dados_basicos.nivel;
        document.getElementById("xp_atual").value = p.dados_basicos.xp_atual || 0;
        document.getElementById("xp_proximo").value = p.dados_basicos.xp_proximo || 50;
        document.getElementById("raca").value = p.dados_basicos.raca;
        document.getElementById("classe").value = p.dados_basicos.classe;
        document.getElementById("url_imagem").value = p.url_imagem;
        document.getElementById("afinidade").value = p.dados_basicos.afinidade_elemental;
        document.getElementById("inventario").value = p.inventario;
        
        document.getElementById("poder").value = p.atributos.poder.bruto;
        document.getElementById("vigor").value = p.atributos.vigor.bruto;
        document.getElementById("velocidade").value = p.atributos.velocidade.bruto;
        document.getElementById("magia").value = p.atributos.magia.bruto;
        document.getElementById("precisao").value = p.atributos.precisao.bruto;
        document.getElementById("esquiva").value = p.atributos.esquiva.bruto;
        document.getElementById("def_magica").value = p.atributos.defesa_magica.bruto;
        
        document.getElementById("lacos").value = p.lacos ? p.lacos.map(l => `${l.nome}: ${l.porcentagem}`).join('\n') : "";
        
        // Carregar Techs
        document.getElementById('lista-techs').innerHTML = ''; // Limpa a lista
        if(Array.isArray(p.techs)) {
            p.techs.forEach(t => adicionarTech(t));
        }

        atualizarDadosMatriz();
    }

    function salvarPersonagem() {
        const id = document.getElementById("id").value;
        const classeNome = document.getElementById("classe").value;
        if (!id || !classeNome) { alert("ID e Classe são obrigatórios!"); return; }
        const info = regrasClasses[classeNome];
        
        const lacosArray = document.getElementById("lacos").value.split('\n').filter(t => t.includes(':')).map(t => {
            const [n, p] = t.split(':'); return { nome: n.trim(), porcentagem: parseInt(p.trim()) || 0 };
        });

        // Coletar Techs
        const techsArray = Array.from(document.querySelectorAll('.tech-box')).map(box => ({
            nome: box.querySelector('.t-nome').value,
            custo: box.querySelector('.t-custo').value,
            elemento: box.querySelector('.t-elemento').value,
            alvo: box.querySelector('.t-alvo').value,
            tipo: box.querySelector('.t-tipo').value,
            valor: box.querySelector('.t-valor').value,
            desc: box.querySelector('.t-desc').value,
            inter: box.querySelector('.t-inter').value,
            combo: box.querySelector('.t-combo').value
        }));

        const vVig = parseInt(document.getElementById("vigor").value);
        const vMag = parseInt(document.getElementById("magia").value);
        const vEsq = parseInt(document.getElementById("esquiva").value);

        const ficha = {
            id: id,
            url_imagem: document.getElementById("url_imagem").value,
            techs: techsArray, // Agora é um array estruturado!
            inventario: document.getElementById("inventario").value,
            lacos: lacosArray,
            dados_basicos: {
                nome: document.getElementById("nome").value,
                nivel: parseInt(document.getElementById("nivel").value),
                xp_atual: parseInt(document.getElementById("xp_atual").value),
                xp_proximo: parseInt(document.getElementById("xp_proximo").value),
                raca: document.getElementById("raca").value,
                classe: classeNome,
                arquetipo: info.arquetipo,
                afinidade_elemental: document.getElementById("afinidade").value
            },
            status: {
                pv_maximo: vVig + info.pv_base,
                pm_maximo: vMag + info.pm_base,
                nd_esquiva_base: 8 + calcularFibonacci(vEsq)
            },
            atributos: {
                poder: { dado: info.dados.poder, bruto: parseInt(document.getElementById("poder").value), bonus: calcularFibonacci(parseInt(document.getElementById("poder").value)) },
                vigor: { dado: info.dados.vigor, bruto: vVig, bonus: calcularFibonacci(vVig) },
                velocidade: { dado: info.dados.velocidade, bruto: parseInt(document.getElementById("velocidade").value), bonus: calcularFibonacci(parseInt(document.getElementById("velocidade").value)) },
                magia: { dado: info.dados.magia, bruto: vMag, bonus: calcularFibonacci(vMag) },
                precisao: { dado: info.dados.precisao, bruto: parseInt(document.getElementById("precisao").value), bonus: calcularFibonacci(parseInt(document.getElementById("precisao").value)) },
                esquiva: { dado: info.dados.esquiva, bruto: vEsq, bonus: calcularFibonacci(vEsq) },
                defesa_magica: { dado: info.dados.def_magica, bruto: parseInt(document.getElementById("def_magica").value), bonus: calcularFibonacci(parseInt(document.getElementById("def_magica").value)) }
            }
        };

        const idx = bancoDeDados.personagens.findIndex(x => x.id === id);
        if(idx > -1) bancoDeDados.personagens[idx] = ficha; else bancoDeDados.personagens.push(ficha);

        const final = JSON.stringify(bancoDeDados, null, 4);
        const blob = new Blob([final], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = "banco_de_dados.json";
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
