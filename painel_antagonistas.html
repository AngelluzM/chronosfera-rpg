<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Chronosfera RPG - Bestiário do Mestre</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; color: #eee; margin: 0; padding: 20px; }
        .container { max-width: 950px; margin: 0 auto; background: #fff; color: #333; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h1 { color: #c0392b; border-bottom: 2px solid #c0392b; padding-bottom: 10px; margin-bottom: 20px; }
        
        .import-section { background: #fdf2f2; padding: 20px; border-radius: 8px; border: 1px dashed #c0392b; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 0.9em; }
        
        input[type="text"], input[type="number"], select, input[type="file"], textarea { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit; font-size: 14px;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        
        .atributos-tabela { background: #fdf9f9; padding: 20px; border-radius: 8px; border: 1px solid #e0e0e0; margin-top: 10px; }
        .atr-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-bottom: 10px; align-items: center; }
        .atr-header { font-weight: bold; color: #c0392b; border-bottom: 2px solid #ddd; padding-bottom: 8px; margin-bottom: 15px; }

        button { 
            background-color: #c0392b; color: white; padding: 14px 20px; border: none; border-radius: 4px; 
            cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 20px; transition: background 0.3s; 
        }
        button:hover { background-color: #a93226; }

        .box-dinamico { background: #fdfdfd; border: 1px solid #dcdde1; border-radius: 6px; padding: 15px; margin-bottom: 15px; position: relative; }
        .tech-box { border-left: 5px solid #8e44ad; } /* Ações de Combate */
        .drop-box { border-left: 5px solid #f1c40f; } /* Recompensas */
        
        .btn-remover { background-color: #7f8c8d; width: auto; padding: 6px 12px; font-size: 12px; position: absolute; right: 15px; top: 10px; margin: 0; z-index: 10; border-radius: 4px; color: white; border: none; cursor: pointer; }
        .btn-add-drop { background-color: #d4ac0d; margin-bottom: 20px;}
        .btn-add-tech { background-color: #8e44ad; margin-bottom: 20px;}
        
        .secao-titulo { margin-top: 40px; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; color: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <h1>Painel de Antagonistas - Chronosfera RPG</h1>
    
    <div class="import-section">
        <div class="grid-2">
            <div class="form-group">
                <label>1. Buscar no Bestiário (banco_antagonistas.json)</label>
                <select id="seletorAntagonista" onchange="carregarParaEdicao()">
                    <option value="">Carregando monstros...</option>
                </select>
            </div>
            <div class="form-group">
                <label>2. Importar Novo Vilão do GEM (.json)</label>
                <input type="file" id="arquivoImport" accept=".json" onchange="importarJSON(event)">
            </div>
        </div>
    </div>

    <h3 class="secao-titulo">👿 Dados da Ameaça</h3>
    <div class="grid-2">
        <div class="form-group"><label>Nome do Antagonista</label><input type="text" id="nome"></div>
        <div class="form-group"><label>ID Único (ex: boss_dragao)</label><input type="text" id="id"></div>
    </div>

    <div class="grid-4">
        <div class="form-group"><label>Nível de Ameaça</label><input type="number" id="nivel" value="1"></div>
        <div class="form-group"><label>Tipo (Elite, Mob, Boss)</label><input type="text" id="tipo_inimigo" placeholder="Ex: Boss"></div>
        <div class="form-group"><label>🛡️ RD (Redução de Dano)</label><input type="number" id="rd_armadura" value="0"></div>
        <div class="form-group">
            <label>Afinidade Elemental</label>
            <select id="afinidade">
                <option value="Neutro">Neutro</option>
                <option value="Fogo">Fogo</option>
                <option value="Gelo/Água">Gelo/Água</option>
                <option value="Luz">Luz</option>
                <option value="Sombra">Sombra</option>
            </select>
        </div>
    </div>

    <div class="form-group"><label>URL da Imagem do Monstro</label><input type="text" id="url_imagem"></div>

    <h3 class="secao-titulo">📊 Atributos de Combate</h3>
    <div class="atributos-tabela">
        <div class="atr-row atr-header"><span>Atributo</span><span>Bruto</span><span>Modificador</span></div>
        <div class="atr-row"><span id="lbl_poder">Poder</span><input type="number" id="poder_bruto" value="0"><input type="number" id="poder_mod" value="0"></div>
        <div class="atr-row"><span id="lbl_vigor">Vigor</span><input type="number" id="vigor_bruto" value="0"><input type="number" id="vigor_mod" value="0"></div>
        <div class="atr-row"><span id="lbl_velocidade">Velocidade</span><input type="number" id="velocidade_bruto" value="0"><input type="number" id="velocidade_mod" value="0"></div>
        <div class="atr-row"><span id="lbl_magia">Magia</span><input type="number" id="magia_bruto" value="0"><input type="number" id="magia_mod" value="0"></div>
        <div class="atr-row"><span id="lbl_precisao">Precisão</span><input type="number" id="precisao_bruto" value="0"><input type="number" id="precisao_mod" value="0"></div>
        <div class="atr-row"><span id="lbl_esquiva">Esquiva</span><input type="number" id="esquiva_bruto" value="0"><input type="number" id="esquiva_mod" value="0"></div>
        <div class="atr-row"><span id="lbl_defesa_magica">Defesa Mágica</span><input type="number" id="defesa_magica_bruto" value="0"><input type="number" id="defesa_magica_mod" value="0"></div>
    </div>

    <h3 class="secao-titulo" style="color: #8e44ad;">⚔️ Ações e Habilidades</h3>
    <div id="lista-techs"></div>
    <button type="button" class="btn-add-tech" onclick="adicionarTech()">+ Adicionar Ação</button>

    <h3 class="secao-titulo" style="color: #d4ac0d;">💎 Recompensas (Loot)</h3>
    <div id="lista-drops"></div>
    <button type="button" class="btn-add-drop" onclick="adicionarDrop()">+ Adicionar Recompensa</button>

    <button onclick="salvarAntagonista()" style="background-color: #c0392b; margin-top: 40px; margin-bottom: 60px;">
        💾 SALVAR NO BESTIÁRIO (JSON)
    </button>
</div>

<script src="antagonista_script.js"></script>
</body>
</html>
