<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Chronosfera RPG - Fichas dos Personagens</title>
    <style>
        /* Estilos base da página - Mantidos */
        body { 
            font-family: Arial, sans-serif; 
            line-height: 1.6; 
            margin: 40px auto; 
            max-width: 1000px; 
            padding: 0 20px; 
            color: #333; 
            background-color: #f9f9f9; 
        }
        nav { 
            margin-bottom: 30px; 
            padding: 15px; 
            background-color: #eee; 
            border-radius: 5px; 
        }
        nav a { margin-right: 20px; text-decoration: none; color: #0056b3; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        h1 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        /* Estilos dos Cartões (Cards) de Ficha - Restaurado e Melhorado */
        .grid-fichas { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
            margin-top: 20px; 
        }
        
        .ficha-card { 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            overflow: hidden; /* Para a imagem respeitar as bordas redondas */
            display: flex;
            flex-direction: column; /* Permite o botão ficar no rodapé */
        }
        
        /* Estilo da imagem - Restaurado */
        .ficha-imagem {
            width: 100%;
            height: 250px;
            object-fit: cover;
            object-position: top;
            border-bottom: 4px solid #3498db;
        }

        .ficha-conteudo { padding: 20px; flex-grow: 1; }

        .ficha-header h2 { margin: 0 0 5px 0; color: #2c3e50; }
        .ficha-header p { 
            margin: 0; 
            color: #7f8c8d; 
            font-size: 0.9em; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 10px; 
            margin-bottom: 10px; 
        }

        /* Destaques de Status (PV, PM, Psiquê, Alma) - Restaurado */
        .status-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 15px; 
        }
        .status-item { 
            background: #f8f9fa; 
            padding: 8px; 
            border-radius: 4px; 
            text-align: center; 
            font-weight: bold; 
            border: 1px solid #eee;
        }
        .status-pv { color: #e74c3c; }
        .status-pm { color: #3498db; }

        /* Tabela de Atributos - Restaurado a tabela completa de 4 colunas */
        .atributos { 
            font-size: 0.9em; 
            border-collapse: collapse; 
            width: 100%; 
            margin-bottom: 15px; 
        }
        .atributos th, .atributos td { 
            border: 1px solid #ddd; 
            padding: 5px; 
            text-align: center; 
        }
        .atributos th { background-color: #f4f4f4; color: #333; }
        
        .esquiva-box {
            text-align: center; 
            background-color: #e8f6f3; 
            padding: 10px; 
            border-radius: 4px; 
            margin-bottom: 15px; 
            font-weight: bold;
            color: #16a085;
        }

        /* Estilo para o Inventário - Mantido */
        .inventario-box {
            background-color: #fcfcfc;
            border: 1px solid #e0e0e0;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.85em;
            white-space: pre-wrap; /* Mantém as quebras de linha que você digitar */
            color: #555;
            margin-bottom: 15px;
        }
        .inventario-box strong { color: #2c3e50; display: block; margin-bottom: 5px; }

        /* Novo Botão para o Modal - Adicionado ao rodapé */
        .btn-techs {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 0 0 8px 8px; /* Arredonda apenas os cantos de baixo */
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-techs:hover { background-color: #2980b9; }

        /* Estilos da Janela Flutuante (Modal) - Adicionado */
        .modal { 
            display: none; /* Escondido por padrão */
            position: fixed; 
            z-index: 1000; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.7); /* Fundo escuro */
        }
        .modal-content { 
            background-color: white; 
            margin: 10% auto; 
            padding: 25px; 
            border-radius: 10px; 
            max-width: 600px; 
            position: relative; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
        }
        .close-btn { 
            position: absolute; 
            right: 20px; 
            top: 15px; 
            font-size: 28px; 
            font-weight: bold; 
            cursor: pointer; 
            color: #aaa; 
        }
        .close-btn:hover { color: #333; }
        #tech-text { 
            white-space: pre-wrap; /* Mantém as quebras de linha que você digitar */
            margin-top: 15px; 
            line-height: 1.5; 
            color: #444; 
        }

        .erro { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Início</a>
        <a href="regras.html">Regras</a>
        <a href="fichas.html">Fichas dos Jogadores</a>
    </nav>

    <h1>Fichas dos Personagens</h1>
    <p>Abaixo estão os heróis e aventureiros ativos no multiverso de Chronosfera.</p>

    <div id="lista-fichas" class="grid-fichas">
        <p>Procurando dados na linha do tempo...</p>
    </div>

    <div id="modalTechs" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharModal()">&times;</span>
            <h2 id="tech-title" style="color: #3498db; border-bottom: 2px solid #eee; padding-bottom: 10px;">Habilidades</h2>
            <div id="tech-text"></div>
        </div>
    </div>

    <script>
        let dadosPersonagens = []; // Guardamos aqui para o modal acessar depois

        // Esta função busca o arquivo JSON que você gerou e salvou no GitHub - Mantido o Anti-Cache
        fetch('banco_de_dados.json?v=' + new Date().getTime())
            .then(response => {
                if (!response.ok) {
                    throw new Error('Arquivo banco_de_dados.json não encontrado.');
                }
                return response.json();
            })
            .then(data => {
                dadosPersonagens = data.personagens; // Guarda os dados completos
                renderizarFichas(data.personagens);
            })
            .catch(error => {
                document.getElementById('lista-fichas').innerHTML = `
                    <div class="erro">
                        <p>Aviso do Sistema: ${error.message}</p>
                    </div>`;
            });

        // Função que desenha o HTML para cada personagem encontrado no JSON - Restaurado ao visual antigo perfeito
        function renderizarFichas(personagens) {
            const container = document.getElementById('lista-fichas');
            container.innerHTML = ''; // Limpa a mensagem de carregamento

            if (!personagens || personagens.length === 0) {
                container.innerHTML = '<p>Nenhum personagem registrado no banco de dados ainda.</p>';
                return;
            }

            personagens.forEach(p => {
                const card = document.createElement('div');
                card.className = 'ficha-card';

                // Lógica da Imagem: Se tem URL, cria a tag <img>, senão não exibe nada
                const imagemHtml = p.url_imagem && p.url_imagem.trim() !== "" 
                    ? `<img src="${p.url_imagem}" class="ficha-imagem" alt="Imagem do personagem">` 
                    : ``;

                // Lógica do Inventário
                const inventarioHtml = p.inventario && p.inventario.trim() !== ""
                    ? `<div class="inventario-box"><strong>Inventário:</strong>${p.inventario}</div>`
                    : ``;

                // Cria o "corpo" da ficha unindo HTML com os dados do JSON - Estrutura antiga restaurada
                const html = `
                    ${imagemHtml}
                    <div class="ficha-conteudo">
                        <div class="ficha-header">
                            <h2>${p.dados_basicos.nome}</h2>
                            <p>Nível ${p.dados_basicos.nivel} | ${p.dados_basicos.raca || "Raça Desconhecida"} |<br> 
                            ${p.dados_basicos.classe} (${p.dados_basicos.arquetipo})<br>
                            Afinidade: ${p.dados_basicos.afinidade_elemental}</p>
                        </div>
                        
                        <div class="status-grid">
                            <div class="status-item status-pv">PV: ${p.status.pv_maximo}</div>
                            <div class="status-item status-pm">PM: ${p.status.pm_maximo}</div>
                        </div>
                        
                        <div class="esquiva-box">
                            ND de Esquiva Base: ${p.status.nd_esquiva_base}
                        </div>

                        <table class="atributos">
                            <tr><th>Atr.</th><th>Dado</th><th>Bruto</th><th>Bônus</th></tr>
                            <tr><td>Poder</td><td>${p.atributos.poder.dado}</td><td>${p.atributos.poder.bruto}</td><td>+${p.atributos.poder.bonus}</td></tr>
                            <tr><td>Vigor</td><td>${p.atributos.vigor.dado}</td><td>${p.atributos.vigor.bruto}</td><td>+${p.atributos.vigor.bonus}</td></tr>
                            <tr><td>Veloc.</td><td>${p.atributos.velocidade.dado}</td><td>${p.atributos.velocidade.bruto}</td><td>+${p.atributos.velocidade.bonus}</td></tr>
                            <tr><td>Magia</td><td>${p.atributos.magia.dado}</td><td>${p.atributos.magia.bruto}</td><td>+${p.atributos.magia.bonus}</td></tr>
                            <tr><td>Precisão</td><td>${p.atributos.precisao.dado}</td><td>${p.atributos.precisao.bruto}</td><td>+${p.atributos.precisao.bonus}</td></tr>
                            <tr><td>Esquiva</td><td>${p.atributos.esquiva.dado}</td><td>${p.atributos.esquiva.bruto}</td><td>+${p.atributos.esquiva.bonus}</td></tr>
                            <tr><td>Def. Mag.</td><td>${p.atributos.defesa_magica.dado}</td><td>${p.atributos.defesa_magica.bruto}</td><td>+${p.atributos.defesa_magica.bonus}</td></tr>
                        </table>

                        ${inventarioHtml}
                    </div>
                    <button class="btn-techs" onclick="abrirModal('${p.id}')">Ver Techs / Habilidades</button>
                `;
                
                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        // Funções do Modal - Mantidas
        function abrirModal(id) {
            const p = dadosPersonagens.find(person => person.id === id);
            if (p) {
                document.getElementById('tech-title').innerText = "Techs: " + p.dados_basicos.nome;
                document.getElementById('tech-text').innerText = p.techs || "Nenhuma habilidade registrada.";
                document.getElementById('modalTechs').style.display = "block";
            }
        }

        function fecharModal() {
            document.getElementById('modalTechs').style.display = "none";
        }

        // Fechar se clicar fora da caixa branca
        window.onclick = function(event) {
            const modal = document.getElementById('modalTechs');
            if (event.target == modal) {
                fecharModal();
            }
        }
    </script>
</body>
</html>
