<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Chronosfera RPG - Fichas</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; margin: 40px auto; max-width: 1200px; padding: 0 20px; color: #333; background-color: #f9f9f9; }
        nav { margin-bottom: 30px; padding: 15px; background-color: #eee; border-radius: 5px; }
        nav a { margin-right: 20px; text-decoration: none; color: #0056b3; font-weight: bold; }
        
        .grid-fichas { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .ficha-card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        .ficha-imagem { width: 100%; height: 200px; object-fit: cover; border-bottom: 4px solid #3498db; }
        .ficha-conteudo { padding: 15px; flex-grow: 1; }
        
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .status-item { background: #f8f9fa; padding: 5px; border-radius: 4px; text-align: center; font-size: 0.9em; font-weight: bold; border: 1px solid #eee; }
        
        .btn-techs { background: #3498db; color: white; border: none; padding: 10px; width: 100%; border-radius: 0 0 8px 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-techs:hover { background: #2980b9; }

        /* Estilos da Janela Flutuante (Modal) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); }
        .modal-content { background-color: white; margin: 10% auto; padding: 25px; border-radius: 10px; max-width: 600px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 28px; font-weight: bold; cursor: pointer; color: #aaa; }
        .close-btn:hover { color: #333; }
        #tech-text { white-space: pre-wrap; margin-top: 15px; line-height: 1.5; color: #444; }

        .atributos { font-size: 0.8em; width: 100%; border-collapse: collapse; margin: 10px 0; }
        .atributos td { border: 1px solid #eee; padding: 3px; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Início</a>
        <a href="regras.html">Regras</a>
        <a href="fichas.html">Fichas</a>
    </nav>

    <h1>Fichas dos Personagens</h1>
    <div id="lista-fichas" class="grid-fichas">Carregando...</div>

    <div id="modalTechs" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharModal()">&times;</span>
            <h2 id="tech-title" style="color: #3498db; border-bottom: 2px solid #eee; padding-bottom: 10px;">Técnicas</h2>
            <div id="tech-text"></div>
        </div>
    </div>

    <script>
        let dadosPersonagens = []; // Guardamos aqui para o modal acessar depois

        fetch('banco_de_dados.json?v=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                dadosPersonagens = data.personagens;
                renderizar(data.personagens);
            });

        function renderizar(lista) {
            const container = document.getElementById('lista-fichas');
            container.innerHTML = '';
            lista.forEach(p => {
                const card = document.createElement('div');
                card.className = 'ficha-card';
                card.innerHTML = `
                    <img src="${p.url_imagem || ''}" class="ficha-imagem">
                    <div class="ficha-conteudo">
                        <h3 style="margin:0">${p.dados_basicos.nome}</h3>
                        <p style="font-size:0.8em; color:#666; margin-bottom:10px">${p.dados_basicos.classe} | Nv ${p.dados_basicos.nivel}</p>
                        <div class="status-grid">
                            <div class="status-item" style="color:#e74c3c">PV: ${p.status.pv_maximo}</div>
                            <div class="status-item" style="color:#3498db">PM: ${p.status.pm_maximo}</div>
                        </div>
                        <table class="atributos">
                            <tr><td>POD: ${p.atributos.poder.bruto}</td><td>VIG: ${p.atributos.vigor.bruto}</td><td>VEL: ${p.atributos.velocidade.bruto}</td></tr>
                            <tr><td>MAG: ${p.atributos.magia.bruto}</td><td>PRE: ${p.atributos.precisao.bruto}</td><td>ESQ: ${p.atributos.esquiva.bruto}</td></tr>
                        </table>
                    </div>
                    <button class="btn-techs" onclick="abrirModal('${p.id}')">Ver Techs / Habilidades</button>
                `;
                container.appendChild(card);
            });
        }

        function abrirModal(id) {
            const p = dadosPersonagens.find(person => person.id === id);
            if (p) {
                document.getElementById('tech-title').innerText = "Techs: " + p.dados_basicos.nome;
                document.getElementById('tech-text').innerText = p.techs || "Nenhuma habilidade registrada.";
                document.getElementById('modalTechs').style.display = "block";
            }
        }

        function fecharModal() {
            document.getElementById('modalTechs').style.display = "none";
        }

        // Fechar se clicar fora da caixa branca
        window.onclick = function(event) {
            const modal = document.getElementById('modalTechs');
            if (event.target == modal) fecharModal();
        }
    </script>
</body>
</html>
