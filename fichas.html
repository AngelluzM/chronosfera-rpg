<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Chronosfera RPG - Fichas</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; margin: 40px auto; max-width: 1100px; padding: 0 20px; color: #333; background-color: #f9f9f9; }
        nav { margin-bottom: 30px; padding: 15px; background-color: #eee; border-radius: 5px; }
        nav a { margin-right: 20px; text-decoration: none; color: #0056b3; font-weight: bold; }
        
        .grid-fichas { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .ficha-card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        .ficha-imagem { width: 100%; height: 250px; object-fit: cover; object-position: top; border-bottom: 4px solid #3498db; }
        .ficha-conteudo { padding: 20px; flex-grow: 1; }
        
        .ficha-header h2 { margin: 0; color: #2c3e50; }
        .ficha-header p { margin: 5px 0 10px; color: #7f8c8d; font-size: 0.9em; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        /* Estilo da Barra de XP */
        .xp-container { margin: 10px 0; font-size: 0.8em; font-weight: bold; }
        .xp-bar-bg { background: #e0e0e0; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 4px; }
        .xp-bar-fill { background: #f1c40f; height: 100%; transition: 0.5s; }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .status-item { background: #f8f9fa; padding: 8px; border-radius: 4px; text-align: center; font-weight: bold; border: 1px solid #eee; }
        
        .atributos { font-size: 0.85em; width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .atributos td { border: 1px solid #ddd; padding: 4px; text-align: center; }
        
        /* Botões laterais no rodapé */
        .footer-btns { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #eee; }
        .btn-action { border: none; padding: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; }
        .btn-techs { background: #3498db; }
        .btn-lacos { background: #9b59b6; }
        .btn-action:hover { opacity: 0.8; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 10% auto; padding: 25px; border-radius: 10px; max-width: 500px; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; }

        /* Barra de Progresso do Laço */
        .laco-item { margin-bottom: 15px; }
        .laco-header { display: flex; justify-content: space-between; font-size: 0.9em; font-weight: bold; margin-bottom: 5px; }
        .laco-bar-bg { background: #eee; height: 12px; border-radius: 6px; overflow: hidden; }
        .laco-bar-fill { background: #d35400; height: 100%; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Início</a>
        <a href="regras.html">Regras</a>
        <a href="fichas.html">Fichas</a>
    </nav>

    <div id="lista-fichas" class="grid-fichas"></div>

    <div id="modalGeral" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let personagens = [];

        fetch('banco_de_dados.json?v=' + new Date().getTime())
            .then(r => r.json())
            .then(data => {
                personagens = data.personagens;
                render();
            });

        function render() {
            const container = document.getElementById('lista-fichas');
            container.innerHTML = '';
            personagens.forEach(p => {
                const xpPct = (p.dados_basicos.xp_atual / p.dados_basicos.xp_proximo) * 100;
                const card = document.createElement('div');
                card.className = 'ficha-card';
                card.innerHTML = `
                    <img src="${p.url_imagem}" class="ficha-imagem">
                    <div class="ficha-conteudo">
                        <div class="ficha-header">
                            <h2>${p.dados_basicos.nome}</h2>
                            <p>Nv ${p.dados_basicos.nivel} | ${p.dados_basicos.raca}<br>${p.dados_basicos.classe} (${p.dados_basicos.arquetipo})</p>
                        </div>
                        
                        <div class="xp-container">
                            Experiência: ${p.dados_basicos.xp_atual} / ${p.dados_basicos.xp_proximo}
                            <div class="xp-bar-bg"><div class="xp-bar-fill" style="width: ${xpPct}%"></div></div>
                        </div>

                        <p style="font-size:0.8em; margin: 10px 0 5px;">Afinidade: ${p.dados_basicos.afinidade_elemental}</p>
                        
                        <div class="status-grid">
                            <div class="status-item" style="color:#e74c3c">PV: ${p.status.pv_maximo}</div>
                            <div class="status-item" style="color:#3498db">PM: ${p.status.pm_maximo}</div>
                        </div>

                        <table class="atributos">
                            <tr><td>POD: ${p.atributos.poder.bruto} (+${p.atributos.poder.bonus})</td><td>VIG: ${p.atributos.vigor.bruto} (+${p.atributos.vigor.bonus})</td></tr>
                            <tr><td>VEL: ${p.atributos.velocidade.bruto} (+${p.atributos.velocidade.bonus})</td><td>MAG: ${p.atributos.magia.bruto} (+${p.atributos.magia.bonus})</td></tr>
                            <tr><td>PRE: ${p.atributos.precisao.bruto} (+${p.atributos.precisao.bonus})</td><td>ESQ: ${p.atributos.esquiva.bruto} (+${p.atributos.esquiva.bonus})</td></tr>
                        </table>
                    </div>
                    <div class="footer-btns">
                        <button class="btn-action btn-techs" onclick="abrirTechs('${p.id}')">Techs</button>
                        <button class="btn-action btn-lacos" onclick="abrirLacos('${p.id}')">Laços</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function abrirTechs(id) {
            const p = personagens.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = "Techs & Habilidades";
            document.getElementById('modalBody').innerHTML = `<p style="white-space:pre-wrap">${p.techs || 'Sem techs.'}</p>`;
            document.getElementById('modalGeral').style.display = 'block';
        }

        function abrirLacos(id) {
            const p = personagens.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = "Laços de " + p.dados_basicos.nome;
            let html = '';
            if(p.lacos && p.lacos.length > 0) {
                p.lacos.forEach(l => {
                    html += `
                        <div class="laco-item">
                            <div class="laco-header"><span>${l.nome}</span><span>${l.porcentagem}%</span></div>
                            <div class="laco-bar-bg"><div class="laco-bar-fill" style="width: ${l.porcentagem}%"></div></div>
                        </div>
                    `;
                });
            } else { html = '<p>Nenhum laço formado ainda.</p>'; }
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modalGeral').style.display = 'block';
        }

        function fecharModal() { document.getElementById('modalGeral').style.display = 'none'; }
        window.onclick = function(e) { if(e.target.className === 'modal') fecharModal(); }
    </script>
</body>
</html>
