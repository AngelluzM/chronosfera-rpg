<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Chronosfera RPG</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            line-height: 1.6; 
            margin: 40px auto; 
            max-width: 1000px; 
            padding: 0 20px; 
            color: #333;
            background-color: #f9f9f9;
            overflow-y: scroll; /* O SEGREDO: Mantém a barra de rolagem fixa para o layout não dançar */
        }
        nav { 
            margin-bottom: 30px; 
            padding: 15px; 
            background-color: #eee; 
            border-radius: 5px; 
            display: flex;
            gap: 20px;
        }
        nav a { 
            text-decoration: none; 
            color: #0056b3; 
            font-weight: bold; 
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        nav a:hover {
            background-color: #ddd;
        }
        nav a.ativo {
            background-color: #3498db;
            color: white;
        }
        h1 { 
            color: #2c3e50; 
            border-bottom: 2px solid #eee; 
            padding-bottom: 10px; 
            margin-top: 0;
        }
        
        /* Oculta as seções por padrão e mostra apenas a ativa com transição suave */
        .secao { display: none; }
        .secao.ativa { display: block; animation: fadeIn 0.3s ease-in-out; }

        /* Animação simplificada apenas na opacidade para evitar engasgos de layout */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Estilo para os iframes preencherem bem a tela */
        .doc-container {
            width: 100%;
            height: 75vh; 
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-top: 15px;
            background-color: white;
        }
    </style>
</head>
<body>

    <nav>
        <a onclick="mostrarSecao('inicio', this)" class="ativo">Início</a>
        <a onclick="mostrarSecao('historia', this)">História</a>
        <a onclick="mostrarSecao('regras', this)">Regras</a>
        <a href="fichas.html">Fichas dos Jogadores</a>
    </nav>

    <div id="inicio" class="secao ativa">
        <h1>Bem-vindo ao Chronosfera RPG</h1>
        <p>Este é o portal oficial do nosso sistema. Use o menu acima para navegar pela narrativa do mundo, consultar as regras e ver as fichas atualizadas dos personagens.</p>
    </div>

    <div id="historia" class="secao">
        <h1>História do Mundo</h1>
        <iframe class="doc-container" src="https://docs.google.com/document/d/1jeW4iKwZaI5UrmxjH9XR32UemYb1x6fQiRJbhDsWhkk/preview"></iframe>
    </div>

    <div id="regras" class="secao">
        <h1>Regras do Sistema</h1>
        <iframe class="doc-container" src="https://docs.google.com/document/d/1CuajzTWO3LZVEYR3Lg9KR-6W6C8J7iLyWWiHt4lYyDI/preview"></iframe>
    </div>

    <script>
        function mostrarSecao(idSecao, elementoClicado) {
            // Esconde todas as seções
            document.querySelectorAll('.secao').forEach(secao => {
                secao.classList.remove('ativa');
            });
            // Remove a classe 'ativo' dos botões de navegação
            document.querySelectorAll('nav a[onclick]').forEach(link => {
                link.classList.remove('ativo');
            });
            
            // Mostra a seção correta e pinta o botão clicado
            document.getElementById(idSecao).classList.add('ativa');
            elementoClicado.classList.add('ativo');
        }
    </script>
</body>
</html>
